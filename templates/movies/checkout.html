{% extends "users/basic.html" %}
{% block content %}
<div class="container mt-5 text-center">
    <div class="card mx-auto shadow-sm" style="max-width: 500px;">
        <div class="card-body py-5">
            <h3 class="card-title text-success mb-3"><i class="fas fa-lock"></i> Secure Checkout</h3>
            <p class="text-muted mb-4">You are booking <strong>{{ booked_seat_numbers }}</strong> for <strong>{{
                    theater.movie.name }}</strong>.</p>
            <h4 class="mb-4">Total Amount: <strong>₹{{ total_amount }}</strong></h4>

            <button id="rzp-button1" class="btn btn-primary btn-lg w-100">Pay Securely with Razorpay</button>

            <!-- Hidden form for Razorpay Callback via POST -->
            <form action="{% url 'razorpay_callback' %}" method="POST" id="payment-form" class="d-none">
                {% csrf_token %}
                <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
                <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
                <input type="hidden" name="razorpay_signature" id="razorpay_signature">
            </form>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    var options = {
        "key": "{{ razorpay_key_id }}",
        "amount": "{{ razorpay_amount }}", // in paise
        "currency": "INR",
        "name": "BookMyShow Clone",
        "description": "Ticket Booking for {{ theater.movie.name }}",
        "order_id": "{{ razorpay_order_id }}",
        "handler": function (response) {
            console.log("RAZORPAY SUCCESS! Received Payment ID:", response.razorpay_payment_id);
            console.log("Now submitting the hidden form to trigger the backend callback...");
            
            // Populate the hidden form and submit to our backend callback
            document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
            document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
            document.getElementById('razorpay_signature').value = response.razorpay_signature;
            document.getElementById('payment-form').submit();
        },
        "prefill": {
            "name": "{{ request.user.first_name }} {{ request.user.last_name }}",
            "email": "{{ request.user.email }}"
        },
        "theme": {
            "color": "#F37254"
        },
        "modal": {
        "ondismiss": function() {
            // Payment cancelled by user. Free seats immediately.
            window.location.href = "{% url 'razorpay_cancel' razorpay_order_id %}?movie_id={{ theater.movie.id }}";
        }
    }
    };
    var rzp1 = new Razorpay(options);

    // Automatically open Razorpay when page loads, or button is clicked
    document.getElementById('rzp-button1').onclick = function (e) {
        console.log("Opening Razorpay checkout overlay...");
        rzp1.open();
        e.preventDefault();
    }
    
    rzp1.on('payment.failed', function (response){
        console.error("RAZORPAY CHECKOUT FAILED:", response.error.description);
        console.error("Error Code:", response.error.code);
        console.error("Payment ID:", response.error.metadata.payment_id);
    });
    // Un-comment the line below to auto-launch the popup immediately
    rzp1.open();
</script>
{% endblock %}
